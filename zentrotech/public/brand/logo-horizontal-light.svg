          font-size="84"
          font-weight="800"
          letter-spacing="6"
          fill="#0a0a0f">ZENTRO<tspan fill="url(#zthl-tech)">TECH</tspan></text>
    <line x1="2" y1="148" x2="180" y2="148" stroke="#0a0a0f" stroke-opacity="0.25" stroke-width="2"/>
    <line x1="184" y1="148" x2="540" y2="148" stroke="url(#zthl-tech)" stroke-opacity="0.7" stroke-width="2"/>
    <circle cx="184" cy="148" r="3" fill="#ec4899"/>
