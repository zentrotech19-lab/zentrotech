<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="ZentroTECH">
  <title>ZentroTECH</title>
  <defs>
    <linearGradient id="zthl-tech" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- mark in dark mono for light backgrounds -->
  <g transform="translate(0,0)">
    <path d="M100 18 L168 58 L168 142 L100 182 L32 142 L32 58 Z"
