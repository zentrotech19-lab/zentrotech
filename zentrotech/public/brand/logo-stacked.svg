<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="ZentroTECH">
  <title>ZentroTECH</title>
  <defs>
    <linearGradient id="zts-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="zts-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="zts-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zts-tech" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- mark, centered -->
  <g transform="translate(100,30)">
    <circle cx="100" cy="100" r="78" fill="url(#zts-glow)"/>
    <path d="M100 18 L168 58 L168 142 L100 182 L32 142 L32 58 Z"
          fill="none" stroke="url(#zts-frame)" stroke-width="3" stroke-linejoin="round"/>
    <g fill="none" stroke="url(#zts-grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 70 L142 70"/>
      <path d="M138 74 L108 104 L92 104 L62 134"/>
      <path d="M58 138 L142 138"/>
    </g>
    <g fill="#ffffff">
      <circle cx="58" cy="70" r="5"/>
      <circle cx="142" cy="70" r="5"/>
      <circle cx="58" cy="138" r="5"/>
      <circle cx="142" cy="138" r="5"/>
    </g>
    <circle cx="100" cy="104" r="4" fill="#ec4899"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(0,360)">
    <text x="200" y="0"
          text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="56"
          font-weight="800"
          letter-spacing="5"
          fill="#ffffff">ZENTRO<tspan fill="url(#zts-tech)">TECH</tspan></text>
    <line x1="80" y1="22" x2="320" y2="22" stroke="url(#zts-tech)" stroke-opacity="0.55" stroke-width="2"/>
    <text x="200" y="68"
          text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="14"
          font-weight="500"
          letter-spacing="8"
          fill="#9ca3af">AI · AGENTS · AUTOMATION</text>
  </g>
</svg>
