<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="ZentroTECH">
  <title>ZentroTECH</title>
  <defs>
    <linearGradient id="zth-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="zth-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="zth-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zth-tech" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- mark, scaled into 200x200 box on the left -->
  <g transform="translate(0,0)">
    <circle cx="100" cy="100" r="78" fill="url(#zth-glow)"/>
    <path d="M100 18 L168 58 L168 142 L100 182 L32 142 L32 58 Z"
          fill="none" stroke="url(#zth-frame)" stroke-width="3" stroke-linejoin="round"/>
    <g fill="none" stroke="url(#zth-grad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 70 L142 70"/>
      <path d="M138 74 L108 104 L92 104 L62 134"/>
      <path d="M58 138 L142 138"/>
    </g>
    <g fill="#ffffff">
      <circle cx="58" cy="70" r="5"/>
      <circle cx="142" cy="70" r="5"/>
      <circle cx="58" cy="138" r="5"/>
      <circle cx="142" cy="138" r="5"/>
    </g>
    <circle cx="100" cy="104" r="4" fill="#ec4899"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(220,0)">
    <text x="0" y="128"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="84"
          font-weight="800"
          letter-spacing="6"
          fill="#ffffff">ZENTRO<tspan fill="url(#zth-tech)">TECH</tspan></text>
    <!-- circuit underline accent -->
    <line x1="2" y1="148" x2="180" y2="148" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <line x1="184" y1="148" x2="540" y2="148" stroke="url(#zth-tech)" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="184" cy="148" r="3" fill="#ec4899"/>
  </g>
</svg>
