<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="ZentroTECH">
  <title>ZentroTECH</title>
  <defs>
    <linearGradient id="ati-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="50%" stop-color="#3b1d6b"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="ati-aurora" cx="0.25" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ati-aurora2" cx="0.85" cy="0.85" r="0.7">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ati-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="ati-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- iOS rounds the rect — fill bleed -->
  <rect width="180" height="180" fill="url(#ati-bg)"/>
  <rect width="180" height="180" fill="url(#ati-aurora)"/>
  <rect width="180" height="180" fill="url(#ati-aurora2)"/>

  <!-- mark scaled to 130, centered -->
  <g transform="translate(25,25) scale(0.65)">
    <path d="M100 18 L168 58 L168 142 L100 182 L32 142 L32 58 Z"
          fill="none" stroke="url(#ati-frame)" stroke-width="3" stroke-linejoin="round"/>
    <g fill="none" stroke="url(#ati-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 70 L142 70"/>
      <path d="M138 74 L108 104 L92 104 L62 134"/>
      <path d="M58 138 L142 138"/>
    </g>
    <g fill="#ffffff">
      <circle cx="58" cy="70" r="6"/>
      <circle cx="142" cy="70" r="6"/>
      <circle cx="58" cy="138" r="6"/>
      <circle cx="142" cy="138" r="6"/>
    </g>
    <circle cx="100" cy="104" r="5" fill="#ec4899"/>
  </g>
</svg>
