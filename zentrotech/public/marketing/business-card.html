<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ZentroTECH Business Card</title>
<style>
  /* Print at exact 89mm x 51mm (3.5" x 2") with bleed-safe inner padding */
  @page {
    size: 89mm 51mm;
    margin: 0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #2a2a30; /* dark off-page background for screen preview */
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    color: #ffffff;
  }

  .card {
    width: 89mm;
    height: 51mm;
    position: relative;
    overflow: hidden;
    background: #0a0a0f;
    page-break-after: always;
  }

  /* Aurora gradient mesh */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 30%, rgba(99,102,241,0.55), transparent 55%),
      radial-gradient(circle at 85% 75%, rgba(236,72,153,0.45), transparent 50%),
      radial-gradient(circle at 50% 0%,  rgba(6,182,212,0.25), transparent 60%);
    pointer-events: none;
  }

  /* Subtle grid */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(99,102,241,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(99,102,241,0.06) 1px, transparent 1px);
    background-size: 6mm 6mm;
    pointer-events: none;
  }

  .inner {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    padding: 5mm 6mm;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* === FRONT === */
  .front-top {
    display: flex;
    align-items: center;
    gap: 3mm;
  }
  .logo-mark {
    width: 12mm;
    height: 12mm;
    border-radius: 2.5mm;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 800;
    font-size: 7mm;
    line-height: 1;
    letter-spacing: -0.5mm;
  }
  .wordmark {
    font-size: 5.5mm;
    font-weight: 700;
    letter-spacing: -0.2mm;
    background: linear-gradient(90deg, #ffffff 0%, #c7d2fe 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .front-bottom .name {
    font-size: 4mm;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.1mm;
  }
  .front-bottom .title {
    font-size: 2.6mm;
    font-weight: 500;
    color: #c7d2fe;
    margin-top: 0.5mm;
  }
  .front-bottom .contact {
    font-size: 2.4mm;
    color: #9ca3af;
    margin-top: 1.5mm;
    font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
    line-height: 1.5;
  }
  .accent-bar {
    position: absolute;
    left: 0;
    bottom: 0;
    height: 1.2mm;
    width: 100%;
    background: linear-gradient(90deg, #06b6d4 0%, #6366f1 35%, #8b5cf6 65%, #ec4899 100%);
    z-index: 3;
  }

  /* === BACK === */
  .back-inner {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5mm;
  }
  .back-tagline {
    font-size: 5mm;
    font-weight: 700;
    line-height: 1.2;
    background: linear-gradient(90deg, #ffffff 0%, #c7d2fe 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.2mm;
    max-width: 70mm;
    margin: 0 auto;
  }
  .back-url {
    font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
    font-size: 3.4mm;
    color: #ec4899;
    margin-top: 3.5mm;
    font-weight: 600;
  }
  .back-meta {
    font-size: 2.4mm;
    color: #9ca3af;
    margin-top: 2mm;
    letter-spacing: 0.4mm;
    font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
  }
  .back-socials {
    margin-top: 3mm;
    font-size: 2.6mm;
    color: #c7d2fe;
    letter-spacing: 0.2mm;
  }

  /* Screen preview spacing */
  @media screen {
    body { padding: 24px; }
    .card { box-shadow: 0 8px 32px rgba(0,0,0,0.4); margin-bottom: 20px; border-radius: 2mm; }
  }
</style>
</head>
<body>

<!-- ============== FRONT ============== -->
<div class="card" aria-label="Business card front">
  <div class="inner">
    <div class="front-top">
      <div class="logo-mark">Z</div>
      <div class="wordmark">ZentroTECH</div>
    </div>
    <div class="front-bottom">
      <div class="name">[Full Name]</div>
      <div class="title">[Role / Title]</div>
      <div class="contact">
        [name]@zentrotech.ai<br/>
        +91 80 0000 0000
      </div>
    </div>
  </div>
  <div class="accent-bar"></div>
</div>

<!-- ============== BACK ============== -->
<div class="card" aria-label="Business card back">
  <div class="inner back-inner">
    <div class="back-tagline">Engineering the AI of 2050, today.</div>
    <div class="back-url">zentrotech.ai</div>
    <div class="back-meta">BANGALORE &middot; DUBAI &middot; GLOBAL</div>
    <div class="back-socials">@zentrotech</div>
  </div>
  <div class="accent-bar"></div>
</div>

</body>
</html>
