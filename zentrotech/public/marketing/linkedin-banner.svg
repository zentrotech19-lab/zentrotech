<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" role="img" aria-label="ZentroTECH — Engineering the AI of 2050, today.">
  <defs>
    <radialGradient id="aurora-a" cx="20%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora-b" cx="80%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora-c" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base void black -->
  <rect width="1584" height="396" fill="#0a0a0f"/>
  <!-- Subtle grid -->
  <rect width="1584" height="396" fill="url(#grid)"/>
  <!-- Aurora layers -->
  <rect width="1584" height="396" fill="url(#aurora-a)"/>
  <rect width="1584" height="396" fill="url(#aurora-b)"/>
  <rect width="1584" height="396" fill="url(#aurora-c)"/>

  <!-- Particle field (decorative dots) -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="120" cy="80" r="1.4"/>
    <circle cx="260" cy="320" r="1"/>
    <circle cx="420" cy="140" r="1.6"/>
    <circle cx="600" cy="60" r="1.2"/>
    <circle cx="780" cy="340" r="1.4"/>
    <circle cx="940" cy="120" r="1"/>
    <circle cx="1120" cy="280" r="1.6"/>
    <circle cx="1300" cy="180" r="1.2"/>
    <circle cx="1450" cy="80" r="1.4"/>
    <circle cx="1500" cy="320" r="1"/>
  </g>

  <!-- Glowing ring (neural orb hint) on the right -->
  <g transform="translate(1280 198)" filter="url(#glow)" opacity="0.95">
    <circle r="92" fill="none" stroke="#06b6d4" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle r="64" fill="none" stroke="#8b5cf6" stroke-opacity="0.55" stroke-width="1.2"/>
    <circle r="36" fill="none" stroke="#ec4899" stroke-opacity="0.7" stroke-width="1.4"/>
    <circle r="6" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(96 168)">
    <!-- Logo mark: stylized Z in a hex frame -->
    <g transform="translate(0 -2)">
      <rect x="0" y="0" width="64" height="64" rx="16" fill="#0a0a0f" stroke="#6366f1" stroke-width="1.5"/>
      <path d="M16 18 L48 18 L20 46 L48 46" fill="none" stroke="url(#wordmark)" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <!-- Wordmark text -->
    <text x="86" y="46" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-1.5" fill="url(#wordmark)">ZentroTECH</text>
  </g>

  <!-- Tagline -->
  <text x="96" y="252" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" fill="#e5e7eb" letter-spacing="0.2">
    Engineering the AI of 2050, today.
  </text>

  <!-- Subline / locations -->
  <text x="96" y="290" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-size="14" fill="#9ca3af" letter-spacing="2">
    BANGALORE  ·  DUBAI  ·  GLOBAL
  </text>

  <!-- URL pill -->
  <g transform="translate(96 318)">
    <rect width="220" height="44" rx="22" fill="#1a0f2e" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.2"/>
    <circle cx="22" cy="22" r="4" fill="#ec4899"/>
    <text x="40" y="29" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" fill="#ffffff">zentrotech.ai</text>
  </g>
</svg>
